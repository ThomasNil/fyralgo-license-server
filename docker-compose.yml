services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data  # Sparar databasen på din Windows-disk i en mapp som heter "data"

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      # regtech frameworks mirror (EBA reference data), served on reporting.fyrvest.com.
      # Read-only: the mirror must never be able to modify its own contents.
      - C:/srv/frameworks:/srv/mirror:ro
    networks:
      - default
      - edge
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:

networks:
  edge:
    external: true