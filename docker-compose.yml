services:
  api:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data  # Sparar databasen på din Windows-disk i en mapp som heter "data"

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config: